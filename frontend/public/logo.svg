<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)" />
  <!-- Outer ring -->
  <circle cx="46" cy="56" r="34" fill="none" stroke="white" stroke-width="7" />
  <!-- Middle ring -->
  <circle cx="46" cy="56" r="21" fill="none" stroke="white" stroke-width="7" />
  <!-- Inner ring -->
  <circle cx="46" cy="56" r="9.5" fill="none" stroke="white" stroke-width="7" />
  <!-- Center dot -->
  <circle cx="46" cy="56" r="4" fill="white" />
  <!-- Arrow shaft: center → top-right -->
  <line x1="46" y1="56" x2="83" y2="18" stroke="white" stroke-width="7" stroke-linecap="round" />
  <!-- Arrowhead -->
  <polyline points="60,18 83,18 83,41" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
</svg>
